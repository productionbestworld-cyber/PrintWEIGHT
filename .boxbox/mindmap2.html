<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<title>BWP — Mindmap ก้างปลา</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#060810;font-family:'Sarabun',sans-serif;overflow:hidden}

#wrap{width:100vw;height:100vh;cursor:grab;user-select:none}
#wrap.dragging{cursor:grabbing}
svg{width:100%;height:100%}

/* node foreignObject */
.node{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;border-radius:14px;padding:8px 12px;
  line-height:1.3;white-space:nowrap;
}
.node-center{
  border-radius:20px;padding:14px 20px;
  background:linear-gradient(135deg,#1e3a8a,#4c1d95);
  border:2.5px solid #818cf8;
  box-shadow:0 0 40px #6366f160;
}
.node-center .icon{font-size:28px;margin-bottom:4px}
.node-center .label{font-size:15px;font-weight:900;color:#fff}
.node-center .sub{font-size:10px;color:#a5b4fc;margin-top:2px}

.node-main{
  border-radius:14px;padding:9px 14px;
  border:2px solid;
}
.node-main .icon{font-size:18px;margin-bottom:2px}
.node-main .label{font-size:12px;font-weight:800;color:#fff}

.node-leaf{
  border-radius:10px;padding:6px 11px;
  border:1.5px solid;
}
.node-leaf .label{font-size:10.5px;font-weight:600;color:#fff}
.node-leaf .sub{font-size:9px;margin-top:1px}

/* tooltip */
#tooltip{
  position:fixed;pointer-events:none;z-index:999;
  background:#1e293b;border:1px solid #334155;
  border-radius:10px;padding:8px 14px;
  font-size:12px;color:#e2e8f0;max-width:200px;
  line-height:1.5;display:none;
  box-shadow:0 8px 24px #00000080;
}

/* legend */
#legend{
  position:fixed;bottom:20px;left:20px;
  background:#0f172a;border:1px solid #1e293b;
  border-radius:12px;padding:12px 16px;
  font-size:11px;color:#64748b;
  line-height:1.8;
}
#legend b{color:#94a3b8}

/* controls */
#controls{
  position:fixed;bottom:20px;right:20px;
  display:flex;flex-direction:column;gap:6px;
}
#controls button{
  width:36px;height:36px;border-radius:10px;
  background:#1e293b;border:1px solid #334155;
  color:#94a3b8;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
#controls button:hover{background:#334155;color:#fff}

/* title */
#title{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:#0f172a;border:1px solid #1e293b;
  border-radius:999px;padding:6px 20px;
  font-size:13px;font-weight:700;color:#e2e8f0;
  pointer-events:none;
}
</style>
</head>
<body>

<div id="title">🐟 ระบบชั่งน้ำหนักม้วน BWP — Mindmap</div>
<div id="tooltip"></div>
<div id="legend">
  <b>สี = กลุ่มฟังก์ชัน</b><br>
  🔵 การเข้าระบบ &nbsp; 🟣 การชั่ง<br>
  🟢 คลัง/โอน &nbsp;&nbsp;&nbsp;&nbsp; 🟡 รายงาน<br>
  🔴 Admin &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ⚫ ฐานข้อมูล
</div>
<div id="controls">
  <button onclick="zoom(1.2)" title="ซูมเข้า">＋</button>
  <button onclick="zoom(0.8)" title="ซูมออก">－</button>
  <button onclick="resetView()" title="รีเซ็ต">⟲</button>
</div>

<script>
// ── Pan & Zoom ─────────────────────────────────────────────────────
const svg = document.getElementById('svg')
const wrap = document.getElementById('wrap')
let vx=0,vy=0,vw=1600,vh=900
let dragging=false,sx=0,sy=0,ox=0,oy=0
let scale=1

function setView(){svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`)}

wrap.addEventListener('mousedown',e=>{
  dragging=true;wrap.classList.add('dragging')
  sx=e.clientX;sy=e.clientY;ox=vx;oy=vy
})
window.addEventListener('mousemove',e=>{
  if(!dragging)return
  const dx=(e.clientX-sx)*(vw/wrap.clientWidth)
  const dy=(e.clientY-sy)*(vh/wrap.clientHeight)
  vx=ox-dx;vy=oy-dy;setView()
})
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('dragging')})

wrap.addEventListener('wheel',e=>{
  e.preventDefault()
  const factor=e.deltaY>0?1.1:0.9
  const mx=(e.clientX/wrap.clientWidth)*vw+vx
  const my=(e.clientY/wrap.clientHeight)*vh+vy
  vw*=factor;vh*=factor
  vx=mx-(e.clientX/wrap.clientWidth)*vw
  vy=my-(e.clientY/wrap.clientHeight)*vh
  setView()
},{passive:false})

function zoom(f){
  const cx=vx+vw/2,cy=vy+vh/2
  vw*=f;vh*=f;vx=cx-vw/2;vy=cy-vh/2;setView()
}
function resetView(){vx=0;vy=0;vw=1600;vh=900;setView()}

// ── Tooltip ────────────────────────────────────────────────────────
const tip=document.getElementById('tooltip')
document.querySelectorAll('.node-g').forEach(g=>{
  const msg=g.dataset.tip
  if(!msg)return
  g.style.cursor='pointer'
  g.addEventListener('mouseenter',e=>{
    tip.textContent=msg;tip.style.display='block'
    moveTip(e)
  })
  g.addEventListener('mousemove',moveTip)
  g.addEventListener('mouseleave',()=>tip.style.display='none')
})
function moveTip(e){
  let x=e.clientX+14,y=e.clientY+14
  if(x+210>window.innerWidth)x=e.clientX-220
  if(y+80>window.innerHeight)y=e.clientY-80
  tip.style.left=x+'px';tip.style.top=y+'px'
}
</script>
